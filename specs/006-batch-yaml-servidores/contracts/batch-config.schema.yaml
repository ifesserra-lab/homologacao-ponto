# Contrato: Arquivo YAML de entrada para subcomando batch
# Usado por BatchConfigLoader para validar e deserializar

type: object
required:
  - servidores
properties:
  mes:
    type: integer
    minimum: 1
    maximum: 12
    description: "Mês padrão para todos os servidores (1=Jan, 12=Dez)"
  ano:
    type: integer
    minimum: 2000
    description: "Ano padrão para todos os servidores"
  servidores:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - nome
        - siape
      properties:
        nome:
          type: string
          minLength: 1
          description: "Nome completo do servidor em maiúsculas"
        siape:
          type: string
          minLength: 1
          description: "Matrícula SIAPE do servidor"
        mes:
          type: integer
          minimum: 1
          maximum: 12
          description: "Override de mês para este servidor"
        ano:
          type: integer
          minimum: 2000
          description: "Override de ano para este servidor"

# Exemplo válido:
# mes: 5
# ano: 2026
# servidores:
#   - nome: "CELIO PROLICIANO MAIOLI"
#     siape: "1534589"
#   - nome: "OUTRO SERVIDOR"
#     siape: "9876543"
#     mes: 4
