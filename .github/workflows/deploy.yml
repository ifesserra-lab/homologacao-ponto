name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "data/runs/servidores/**"
      - "dashboard/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Compute credential hashes
        env:
          DASHBOARD_USER: ${{ secrets.DASHBOARD_USER }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          echo "PUBLIC_DASHBOARD_USER_HASH=$(python3 -c "import hashlib,os; print(hashlib.sha256(os.environ['DASHBOARD_USER'].encode()).hexdigest())")" >> "$GITHUB_ENV"
          echo "PUBLIC_DASHBOARD_PASSWORD_HASH=$(python3 -c "import hashlib,os; print(hashlib.sha256(os.environ['DASHBOARD_PASSWORD'].encode()).hexdigest())")" >> "$GITHUB_ENV"

      - name: Build Astro site
        working-directory: dashboard
        env:
          SITE_URL: "https://${{ github.repository_owner }}.github.io"
          BASE_PATH: "/${{ github.event.repository.name }}/"
          PUBLIC_DASHBOARD_USER_HASH: ${{ env.PUBLIC_DASHBOARD_USER_HASH }}
          PUBLIC_DASHBOARD_PASSWORD_HASH: ${{ env.PUBLIC_DASHBOARD_PASSWORD_HASH }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
