name: Export Espelho de Ponto

on:
  schedule:
    - cron: "0 8 * * 1"  # every Monday 08:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          playwright install chromium --with-deps

      - name: Run batch export
        env:
          SIGRH_USERNAME: ${{ secrets.SIGRH_USERNAME }}
          SIGRH_PASSWORD: ${{ secrets.SIGRH_PASSWORD }}
        run: |
          homologacao-ponto batch \
            --file servidores.yaml \
            --output-dir data/runs

      - name: Commit exported data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/runs/servidores/
          git diff --cached --quiet || git commit -m "chore: export espelho de ponto $(date -u +%Y-%m-%d)"
          git push
